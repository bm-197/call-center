; ─── Transport ───

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; ─── Dev softphone extensions ───
; Register softphones (Linphone, Zoiper, MicroSIP) with these credentials

[1001]
type = endpoint
context = call-center
disallow = all
allow = ulaw
allow = alaw
auth = 1001-auth
aors = 1001-aors
direct_media = no

[1001-auth]
type = auth
auth_type = userpass
username = 1001
password = test1001

[1001-aors]
type = aor
max_contacts = 1

[1002]
type = endpoint
context = call-center
disallow = all
allow = ulaw
allow = alaw
auth = 1002-auth
aors = 1002-aors
direct_media = no

[1002-auth]
type = auth
auth_type = userpass
username = 1002
password = test1002

[1002-aors]
type = aor
max_contacts = 1

; ─── Extension for human agent (WebRTC) ───

[2001]
type = endpoint
context = call-center
disallow = all
allow = ulaw
allow = alaw
auth = 2001-auth
aors = 2001-aors
direct_media = no
webrtc = yes

[2001-auth]
type = auth
auth_type = userpass
username = 2001
password = test2001

[2001-aors]
type = aor
max_contacts = 1
