; ─── Transport ───

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
; NAT/Tailscale traversal — tell remote clients (Linphone over Tailscale)
; to send their RTP to our reachable address, not the OrbStack-internal IP
; that Asterisk binds to. Update external_*_address if your Tailscale IP
; or LAN IP changes.
external_media_address = 100.89.89.72
external_signaling_address = 100.89.89.72
; Mark RFC1918 subnets as "local" — Asterisk skips NAT rewriting for
; callers on these networks.
;
; CRITICAL: 127.0.0.0/8 is intentionally NOT listed even though Asterisk
; binds on loopback. Reason: Tailscale on Mac runs in userspace and
; rewrites the apparent source IP of Tailscale peers to 127.0.0.1 by the
; time the packet hits Asterisk inside OrbStack. If 127/8 were "local",
; Asterisk would skip NAT rewriting for those Tailscale callers and
; advertise the unreachable OrbStack-internal IP (192.168.139.2) in SDP.
; Excluding 127/8 forces Asterisk to apply external_media_address
; (100.89.89.72) to *all* callers, including the Mac itself — which is
; harmless for Mac-local softphones since 100.89.89.72 is the Mac's
; Tailscale IP and is reachable from the Mac.
local_net = 10.0.0.0/8
local_net = 172.16.0.0/12
local_net = 192.168.0.0/16

[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5060
external_media_address = 100.89.89.72
external_signaling_address = 100.89.89.72
local_net = 10.0.0.0/8
local_net = 172.16.0.0/12
local_net = 192.168.0.0/16

; ─── Dev softphone extensions ───
; Section names MUST match the SIP URI user portion (i.e. dialing
; sip:1001@host registers against the [1001] AOR/endpoint/auth).
; pjsip allows reusing the same section name across different `type` values.

;
; Extension 1001
;
[1001]
type = endpoint
context = call-center
disallow = all
allow = g722
allow = ulaw
allow = alaw
auth = 1001
aors = 1001
direct_media = no
force_rport = yes
rewrite_contact = yes
rtp_symmetric = yes

[1001]
type = auth
auth_type = userpass
username = 1001
password = test1001

[1001]
type = aor
max_contacts = 1
remove_existing = yes
remove_unavailable = yes
qualify_frequency = 30
support_path = yes
default_expiration = 120
maximum_expiration = 300

;
