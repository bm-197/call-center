; Production extensions.conf — identical to dev today (no secrets), but
; lives as a separate file so prod and dev evolve independently.

[call-center]
; All incoming calls go directly to Stasis (ARI) — no IVR.
; The ARI app "call-center" in the api service handles everything.

exten => _X.,1,NoOp(Incoming call from ${CALLERID(num)} to ${EXTEN})
 same => n,Answer()
 same => n,Stasis(call-center)
 same => n,Hangup()

; Internal extension dialing (softphone-to-softphone for testing)
exten => 1001,1,Dial(PJSIP/1001,30)
exten => 1002,1,Dial(PJSIP/1002,30)
exten => 2001,1,Dial(PJSIP/2001,30)
