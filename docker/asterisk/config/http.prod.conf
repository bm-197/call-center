; Production http.conf — ARI HTTP server bound to loopback only so it is
; NOT reachable from the internet, even with `network_mode: host`. The api
; container reaches this via `host.docker.internal:8088` (set up via
; extra_hosts: host-gateway in docker-compose.prod.yml).

[general]
enabled = yes
bindaddr = 127.0.0.1
bindport = 8088
