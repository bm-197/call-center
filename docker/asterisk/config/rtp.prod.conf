; Pin RTP to the same UDP range the VPS firewall (ufw) allows. If these
; drift apart, Linphone -> Asterisk packets are dropped by ufw and the
; STT stream sits idle until it aborts ("Stream timed out after receiving
; no more client requests"), and Linphone reports a 408 after its own
; media timeout.

[general]
rtpstart = 10000
rtpend = 20000
