# Production compose: deploys the full stack on a single VPS.
#
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Architecture:
#   - postgres / redis / rag / web ride a single user-defined bridge.
#   - api and asterisk use host networking. api needs it to reach asterisk's
#     ARI on 127.0.0.1:8088 (asterisk binds ARI to loopback so it is NOT
#     publicly reachable). Postgres / redis / rag are exposed only on
#     127.0.0.1 so the host-networked api can connect to them via localhost.
#   - web stays on the bridge and proxies /api/* to api over the host gateway.
#
# Public ports opened on the VPS:
#   3000/tcp        web
#   4000/tcp        api
#   5060/udp        SIP
#   10000-20000/udp RTP
# (Postgres, Redis, RAG, ARI 8088 are NOT exposed to the public internet.)

name: call-center

x-restart: &restart_policy
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg17
    <<: *restart_policy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-callcenter}
    # Bind only to loopback so the host-networked api can connect via
    # 127.0.0.1:5432 and external traffic is rejected by the kernel.
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-callcenter}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    <<: *restart_policy
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-callcenter}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: 'no'

  rag:
    build:
      context: .
      dockerfile: apps/rag/Dockerfile
    <<: *restart_policy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-callcenter}
    ports:
      - '127.0.0.1:4003:4003'
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4003/health').read()",
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: api
    <<: *restart_policy
    # Host networking so api can reach asterisk's ARI on 127.0.0.1:8088
    # without exposing 8088 to the internet. Postgres/redis/rag are reached
    # via the loopback ports they're mapped to (above).
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB:-callcenter}
      REDIS_URL: redis://127.0.0.1:6379
      RAG_SERVICE_URL: http://127.0.0.1:4003
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      ARI_URL: http://127.0.0.1:8088
      ARI_USERNAME: ${ARI_USERNAME:-callcenter}
      ARI_PASSWORD: ${ARI_PASSWORD:?ARI_PASSWORD is required}
      ARI_APP_NAME: ${ARI_APP_NAME:-call-center}
      ASTERISK_RTP_HOST: 127.0.0.1
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Path inside the container — must point at a service-account JSON
      # mounted via the volumes block below.
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-creds.json
      GCLOUD_PROJECT: ${GCLOUD_PROJECT:-}
      STT_LOCATION: ${STT_LOCATION:-us-central1}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET_RECORDINGS: ${R2_BUCKET_RECORDINGS:-call-recordings}
      R2_BUCKET_KB_UPLOADS: ${R2_BUCKET_KB_UPLOADS:-kb-uploads}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME:-Call Center}
    volumes:
      # Mount the GCP service-account JSON from the host into the container.
      # Path on the host comes from GOOGLE_CREDS_PATH in .env.production.
      - ${GOOGLE_CREDS_PATH:-./google-creds.json}:/run/secrets/google-creds.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      rag:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:4000/health\").then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    <<: *restart_policy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # web's proxy.ts forwards /api/* to API_URL. api is host-networked so
      # we reach it via the docker host gateway alias declared below.
      API_URL: http://host.docker.internal:4000
      NEXT_PUBLIC_API_URL: ${FRONTEND_URL}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_started
    networks:
      - internal

  asterisk:
    build:
      context: ./docker/asterisk
      dockerfile: Dockerfile
    <<: *restart_policy
    network_mode: host
    environment:
      ASTERISK_PUBLIC_IP: ${ASTERISK_PUBLIC_IP:?ASTERISK_PUBLIC_IP is required}
      EXT_1001_PASSWORD: ${EXT_1001_PASSWORD:?EXT_1001_PASSWORD is required}
      EXT_1002_PASSWORD: ${EXT_1002_PASSWORD:?EXT_1002_PASSWORD is required}
      EXT_2001_PASSWORD: ${EXT_2001_PASSWORD:?EXT_2001_PASSWORD is required}
      ARI_PASSWORD: ${ARI_PASSWORD}
    volumes:
      # Templates are rendered into matching .conf files at container start.
      - ./docker/asterisk/config/pjsip.prod.conf.template:/etc/asterisk/pjsip.conf.template:ro
      - ./docker/asterisk/config/ari.prod.conf.template:/etc/asterisk/ari.conf.template:ro
      - ./docker/asterisk/config/http.prod.conf:/etc/asterisk/http.conf:ro
      - ./docker/asterisk/config/extensions.prod.conf:/etc/asterisk/extensions.conf:ro
      - ./docker/asterisk/config/rtp.prod.conf:/etc/asterisk/rtp.conf:ro
      - asterisk_data:/var/spool/asterisk

volumes:
  postgres_data:
  redis_data:
  asterisk_data:

networks:
  internal:
    driver: bridge
